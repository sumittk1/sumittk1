name: Update profile art

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install scraper deps
        run: python -m pip install --upgrade pip && pip install -r scripts/requirements.txt

      - name: Fetch contribution data
        env:
          GH_PROFILE_USER: sumittk1
        run: python scripts/fetch_contributions.py

      - name: Render heatmap SVG
        run: python scripts/render_heatmap_svg.py

      - name: Commit refreshed graph
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: refresh profile contribution graph'
